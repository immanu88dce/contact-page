<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Contacts</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#003366; color:white; padding:15px; text-align:center; }
header img { height:60px; }

.container { padding:20px; }

.section {
    background:white;
    margin-bottom:10px;
    border-radius:8px;
    overflow:hidden;
}

.section h2 {
    margin:0;
    padding:15px;
    background:#0073e6;
    color:white;
    cursor:pointer;
}

.content {
    display:none;
    padding:15px;
}

.contact {
    margin-bottom:15px;
}

a {
    text-decoration:none;
    color:#0073e6;
}
</style>

<script>
function toggle(id){
    var x=document.getElementById(id);
    x.style.display = (x.style.display==="block") ? "none" : "block";
}
</script>

</head>

<body>

<header>
    <!-- Replace logo.png with your company logo -->
    <img src="logo.png" alt="Company Logo">
    <h1>Employee Contact Directory</h1>
</header>

<div class="container">

<!-- Admin -->
<div class="section">
    <h2 onclick="toggle('admin')">Admin</h2>
    <div id="admin" class="content">
        <div class="contact">
            <b>Admin 1</b><br>
            📞 <a href="tel:+911234567890">+91 1234567890</a><br>
            💬 <a href="microsoft-teams://l/chat/0/0?users=someone@example.com">Chat on Teams</a>
        </div>

        <div class="contact">
            <b>Admin 2</b><br>
            📞 <a href="tel:+919876543210">+91 9876543210</a><br>
            💬 <a href="https://teams.microsoft.com/l/chat/0/0?users=admin2@company.com">
                admin2@company.com
            </a>
        </div>
    </div>
</div>

<!-- EHS -->
<div class="section">
    <h2 onclick="toggle('ehs')">EHS</h2>
    <div id="ehs" class="content">
        <div class="contact">
            <b>EHS 1</b><br>
            📞 <a href="tel:+911111111111">+91 1111111111</a><br>
            💬 <a href="https://teams.microsoft.com/l/chat/0/0?users=ehs1@company.com">
                ehs1@company.com
            </a>
        </div>
    </div>
</div>

<!-- IT -->
<div class="section">
    <h2 onclick="toggle('it')">IT</h2>
    <div id="it" class="content">
        <div class="contact">
            <b>IT 1</b><br>
            📞 <a href="tel:+912222222222">+91 2222222222</a><br>
            💬 <a href="https://teams.microsoft.com/l/chat/0/0?users=it1@company.com">
                it1@company.com
            </a>
        </div>
    </div>
</div>

</div>

</body>
</html>
